[mod-setting-name]
detonation-debug-mode=Modo de depuracao
detonation-max-explosions=Maximo de explosoes por detonacao de entidade
detonation-average-speed=Velocidade media dos projeteis detonados
detonation-directional-blasts=Explosoes direcionais
detonation-staggered-detonations=Duracao da detonacao
detonation-initial-detonation-delay=Atraso antes da detonacao

[mod-setting-description]
detonation-debug-mode=Ativa o registro de depuracao (afeta o desempenho)
detonation-max-explosions=Limita o numero total de projeteis detonados a este valor.
detonation-average-speed=Quanto maior o valor, mais rapidos os projeteis ficam (de 0.05 a 2.0).
detonation-directional-blasts=Os projeteis voam predominantemente na direcao oposta ao atacante.
detonation-staggered-detonations=0: Explosao instantanea de tudo que estava na entidade. Valores acima de 0 distribuem a detonacao uniformemente ao longo do tempo pelo numero especificado de ticks (+ sqrt(disparos agendados); 60 = 1 s.).
detonation-initial-detonation-delay=0: Explosao instantanea. Valores acima de 0 adicionam um atraso antes da primeira explosao.
