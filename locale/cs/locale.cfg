[mod-setting-description]
detonation-debug-mode=Zapne ladici zaznamy (ovlivnuje vykon)
detonation-max-explosions=Omezi celkovy pocet detonovanych projektilu na tuto hodnotu.
detonation-average-speed=Cim vyssi hodnota, tim rychlejsi jsou projektily (od 0.05 do 2.0).
detonation-directional-blasts=Projektily leti prevazne smerem pryc od utocnika.
detonation-staggered-detonations=0: Okamzity vybuch vseho, co bylo v entite. Hodnoty nad 0 rovnomerne rozlozi detonaci v case na zadany pocet ticku (+ sqrt(naplanovane vystrely); 60 = 1 s.).
detonation-initial-detonation-delay=0: Okamzity vybuch. Hodnoty nad 0 pridaji zpozdeni pred prvnim vybuchem.
