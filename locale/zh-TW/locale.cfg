[mod-setting-name]
detonation-debug-mode=偵錯模式
detonation-max-explosions=每次實體引爆的最大爆炸數
detonation-average-speed=引爆投射物的平均速度
detonation-directional-blasts=定向爆炸
detonation-staggered-detonations=引爆持續時間
detonation-initial-detonation-delay=引爆前延遲

[mod-setting-description]
detonation-debug-mode=啟用偵錯記錄（影響效能）
detonation-max-explosions=將引爆投射物的總數量限制為此值。
detonation-average-speed=數值越高，投射物速度越快（0.05 到 2.0）。
detonation-directional-blasts=投射物主要朝遠離攻擊者的方向飛行。
detonation-staggered-detonations=0：立即引爆實體中的所有內容。大於 0 的值會在指定 tick 數內平均分散引爆（+ sqrt(已排程射擊數)；60 = 1 秒）。
detonation-initial-detonation-delay=0：立即爆炸。大於 0 的值會在第一次爆炸前增加延遲。
