[mod-setting-description]
detonation-debug-mode=Wlacza logowanie debugowania (wplywa na wydajnosc)
detonation-max-explosions=Ogranicza laczna liczbe detonowanych pociskow do tej wartosci.
detonation-average-speed=Im wyzsza wartosc, tym szybciej leca pociski (od 0.05 do 2.0).
detonation-directional-blasts=Pociski leca przewaznie w kierunku od atakujacego.
detonation-staggered-detonations=0: Natychmiastowa eksplozja wszystkiego, co bylo w obiekcie. Wartosci powyzej 0 rownomiernie rozkladaja detonacje w czasie przez podana liczbe tickow (+ sqrt(zaplanowane strzaly); 60 = 1 sek.).
detonation-initial-detonation-delay=0: Natychmiastowa eksplozja. Wartosci powyzej 0 dodaja opoznienie przed pierwsza eksplozja.
