[mod-setting-name]
detonation-debug-mode=Дебаг режим
detonation-max-explosions=Максимум взрывов на детонацию сущности
detonation-average-speed=Средняя скорость сдетонировавших снарядов
detonation-directional-blasts=Направленные взрывы
detonation-staggered-detonations=Продолжительность детонации
detonation-initial-detonation-delay=Задержка до детонации

[mod-setting-description]
detonation-debug-mode=Включить дебаг логирование (влияет на производительность)
detonation-max-explosions=Ограничивает итоговое число взорванных снарядов этим числом.
detonation-average-speed=Чем выше значение, тем большую скорость имеют снаряды (от: 0.05 до 2.0).
detonation-directional-blasts=Снаряды преимущественно летят по направлению от атакующего.
detonation-staggered-detonations=0 моментальный взрыв всего что было в сущности. Значения выше 0 равномерно размазывают детонацию по времени на указанное число тиков (+ корень(запланированные выстрелы)); 60 = 1 сек.).
detonation-initial-detonation-delay=0 моментальный взрыв. Значение выше 0 добавляют задержку перед первым взрывом.
