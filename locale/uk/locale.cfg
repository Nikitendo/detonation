[mod-setting-name]
detonation-debug-mode=Режим налагодження
detonation-max-explosions=Максимум вибухів на детонацію сутності
detonation-average-speed=Середня швидкість здетонованих снарядів
detonation-directional-blasts=Спрямовані вибухи
detonation-staggered-detonations=Тривалість детонації
detonation-initial-detonation-delay=Затримка перед детонацією

[mod-setting-description]
detonation-debug-mode=Увімкнути журнал налагодження (впливає на продуктивність)
detonation-max-explosions=Обмежує загальну кількість здетонованих снарядів цим значенням.
detonation-average-speed=Що більше значення, то більшу швидкість мають снаряди (від 0.05 до 2.0).
detonation-directional-blasts=Снаряди переважно летять у напрямку від атакувальника.
detonation-staggered-detonations=0: миттєвий вибух усього, що було в сутності. Значення вище 0 рівномірно розподіляють детонацію в часі на вказану кількість тіків (+ sqrt(заплановані постріли); 60 = 1 с.).
detonation-initial-detonation-delay=0: миттєвий вибух. Значення вище 0 додають затримку перед першим вибухом.
