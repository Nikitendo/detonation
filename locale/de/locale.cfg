[mod-setting-description]
detonation-debug-mode=Debug-Protokollierung aktivieren (beeinflusst die Leistung)
detonation-max-explosions=Begrenzt die Gesamtzahl der detonierten Projektile auf diesen Wert.
detonation-average-speed=Je hoeher der Wert, desto schneller sind die Projektile (von 0.05 bis 2.0).
detonation-directional-blasts=Projektile fliegen ueberwiegend in die Richtung weg vom Angreifer.
detonation-staggered-detonations=0: Sofortige Explosion von allem, was in der Entitaet war. Werte ueber 0 verteilen die Detonation gleichmaessig ueber die angegebene Anzahl Ticks (+ sqrt(geplante Schuesse); 60 = 1 s.).
detonation-initial-detonation-delay=0: Sofortige Explosion. Werte ueber 0 fuegen eine Verzoegerung vor der ersten Explosion hinzu.
