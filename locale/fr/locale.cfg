[mod-setting-name]
detonation-debug-mode=Mode debug
detonation-max-explosions=Explosions maximales par detonation d'entite
detonation-average-speed=Vitesse moyenne des projectiles detones
detonation-directional-blasts=Explosions directionnelles
detonation-staggered-detonations=Duree de la detonation
detonation-initial-detonation-delay=Delai avant la detonation

[mod-setting-description]
detonation-debug-mode=Active la journalisation de debug (affecte les performances)
detonation-max-explosions=Limite le nombre total de projectiles detones a cette valeur.
detonation-average-speed=Plus la valeur est elevee, plus les projectiles sont rapides (de 0.05 a 2.0).
detonation-directional-blasts=Les projectiles volent principalement dans la direction opposee a l'attaquant.
detonation-staggered-detonations=0: Explosion instantanee de tout ce qui se trouvait dans l'entite. Les valeurs superieures a 0 repartissent la detonation uniformement dans le temps sur le nombre de ticks indique (+ sqrt(tirs planifies); 60 = 1 s.).
detonation-initial-detonation-delay=0: Explosion instantanee. Les valeurs superieures a 0 ajoutent un delai avant la premiere explosion.
