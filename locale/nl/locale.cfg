[mod-setting-description]
detonation-debug-mode=Schakelt debugregistratie in (beinvloedt de prestaties)
detonation-max-explosions=Beperkt het totale aantal gedetoneerde projectielen tot deze waarde.
detonation-average-speed=Hoe hoger de waarde, hoe sneller de projectielen zijn (van 0.05 tot 2.0).
detonation-directional-blasts=Projectielen vliegen voornamelijk in de richting weg van de aanvaller.
detonation-staggered-detonations=0: Directe explosie van alles wat in de entiteit zat. Waarden boven 0 spreiden de detonatie gelijkmatig over de opgegeven hoeveelheid ticks (+ sqrt(geplande schoten); 60 = 1 sec.).
detonation-initial-detonation-delay=0: Directe explosie. Waarden boven 0 voegen een vertraging toe voor de eerste explosie.
