[mod-setting-description]
detonation-debug-mode=Enable debug logging (affects performance)
detonation-max-explosions=Limits the total number of detonated projectiles to this number.
detonation-average-speed=The higher the value, the faster the projectiles speed (from 0.05 to 2.0).
detonation-directional-blasts=Projectiles fly predominantly in the direction away from the attacker.
detonation-staggered-detonations=0: Instant explosion of everything that was in entity. Values above 0 spread the detonation evenly over time for the specified number of ticks (+ sqrt(scheduled shots); 60 = 1 sec.).
detonation-initial-detonation-delay=0: Instant explosion. Values ​​above 0 add a delay before the initial explosion.
detonation-controlled-chest-detonation=Adds the dedicated technology, chest interface, proxy detonators, and the ability to detonate chests manually or by circuit condition. If disabled, only the basic item detonation on entity destruction remains.
