[mod-setting-name]
detonation-debug-mode=Mode de depuracio
detonation-max-explosions=Maxim d'explosions per detonacio d'entitat
detonation-average-speed=Velocitat mitjana dels projectils detonats
detonation-directional-blasts=Explosions direccionals
detonation-staggered-detonations=Durada de la detonacio
