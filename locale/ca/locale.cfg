[mod-setting-description]
detonation-debug-mode=Activa el registre de depuracio (afecta el rendiment)
detonation-max-explosions=Limita el nombre total de projectils detonats a aquest valor.
detonation-average-speed=Com mes alt sigui el valor, mes rapids seran els projectils (de 0.05 a 2.0).
detonation-directional-blasts=Els projectils volen predominantment en direccio oposada a l'atacant.
detonation-staggered-detonations=0: Explosio instantania de tot el que hi havia a l'entitat. Els valors superiors a 0 distribueixen la detonacio uniformement en el temps pel nombre de ticks indicat (+ sqrt(projectils programats); 60 = 1 s.).
detonation-initial-detonation-delay=0: Explosio instantania. Els valors superiors a 0 afegeixen un retard abans de la primera explosio.
