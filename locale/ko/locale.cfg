[mod-setting-name]
detonation-debug-mode=디버그 모드
detonation-max-explosions=엔티티 폭발당 최대 폭발 수
detonation-average-speed=폭발한 투사체의 평균 속도
detonation-directional-blasts=방향성 폭발
detonation-staggered-detonations=폭발 지속 시간
detonation-initial-detonation-delay=폭발 전 지연

[mod-setting-description]
detonation-debug-mode=디버그 로그를 활성화합니다 (성능에 영향을 줌)
detonation-max-explosions=폭발하는 투사체의 총수를 이 값으로 제한합니다.
detonation-average-speed=값이 높을수록 투사체 속도가 빨라집니다 (0.05부터 2.0까지).
detonation-directional-blasts=투사체는 주로 공격자에게서 멀어지는 방향으로 날아갑니다.
detonation-staggered-detonations=0: 엔티티 안에 있던 모든 것을 즉시 폭발시킵니다. 0보다 큰 값은 지정한 틱 수 동안 폭발을 균등하게 분산합니다 (+ sqrt(예약된 발사 수); 60 = 1초).
detonation-initial-detonation-delay=0: 즉시 폭발합니다. 0보다 큰 값은 첫 폭발 전 지연을 추가합니다.
