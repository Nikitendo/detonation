[mod-setting-name]
detonation-debug-mode=Modo de depuracion
detonation-max-explosions=Maximo de explosiones por detonacion de entidad
detonation-average-speed=Velocidad media de los proyectiles detonados
detonation-directional-blasts=Explosiones direccionales
detonation-staggered-detonations=Duracion de la detonacion
detonation-initial-detonation-delay=Retraso antes de la detonacion

[mod-setting-description]
detonation-debug-mode=Activa el registro de depuracion (afecta al rendimiento)
detonation-max-explosions=Limita el numero total de proyectiles detonados a este valor.
detonation-average-speed=Cuanto mayor sea el valor, mas rapidos seran los proyectiles (de 0.05 a 2.0).
detonation-directional-blasts=Los proyectiles vuelan principalmente en direccion opuesta al atacante.
detonation-staggered-detonations=0: Explosion instantanea de todo lo que habia en la entidad. Los valores superiores a 0 distribuyen la detonacion uniformemente en el tiempo durante el numero de ticks indicado (+ sqrt(disparos programados); 60 = 1 s.).
detonation-initial-detonation-delay=0: Explosion instantanea. Los valores superiores a 0 anaden un retraso antes de la primera explosion.
