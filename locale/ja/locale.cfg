[mod-setting-name]
detonation-debug-mode=デバッグモード
detonation-max-explosions=エンティティの爆発ごとの最大爆発数
detonation-average-speed=爆発した投射物の平均速度
detonation-directional-blasts=指向性爆発
detonation-staggered-detonations=爆発の継続時間
detonation-initial-detonation-delay=爆発前の遅延

[mod-setting-description]
detonation-debug-mode=デバッグログを有効にします (パフォーマンスに影響します)
detonation-max-explosions=爆発する投射物の合計数をこの値に制限します。
detonation-average-speed=値が高いほど投射物の速度が速くなります (0.05 から 2.0)。
detonation-directional-blasts=投射物は主に攻撃者から離れる方向へ飛びます。
detonation-staggered-detonations=0: エンティティ内にあったものをすべて即座に爆発させます。0 より大きい値では、指定したティック数にわたって爆発を均等に分散します (+ sqrt(予定された発射数); 60 = 1 秒)。
detonation-initial-detonation-delay=0: 即時爆発。0 より大きい値では、最初の爆発までの遅延を追加します。
