[mod-setting-description]
detonation-debug-mode=Hibakeresesi naplozas engedelyezese (befolyasolja a teljesitmenyt)
detonation-max-explosions=Erre az ertekre korlatozza a detonalt lovedekek teljes szamat.
detonation-average-speed=Minel nagyobb az ertek, annal gyorsabbak a lovedekek (0.05 es 2.0 kozott).
detonation-directional-blasts=A lovedekek tobbnyire a tamadotol tavolodo iranyba repulnek.
detonation-staggered-detonations=0: Az entitasban levo osszes targy azonnal felrobban. A 0-nal nagyobb ertekek a detonaciot egyenletesen elosztjak a megadott szamu tick alatt (+ sqrt(utemezett lovesek); 60 = 1 mp.).
detonation-initial-detonation-delay=0: Azonnali robbanas. A 0-nal nagyobb ertekek kesleltetest adnak az elso robbanas ele.
