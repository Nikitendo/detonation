[mod-setting-name]
detonation-debug-mode=调试模式
detonation-max-explosions=每次实体引爆的最大爆炸数
detonation-average-speed=引爆弹丸的平均速度
detonation-directional-blasts=定向爆炸
detonation-staggered-detonations=引爆持续时间
detonation-initial-detonation-delay=引爆前延迟

[mod-setting-description]
detonation-debug-mode=启用调试日志（影响性能）
detonation-max-explosions=将引爆弹丸的总数量限制为此值。
detonation-average-speed=数值越高，弹丸速度越快（0.05 到 2.0）。
detonation-directional-blasts=弹丸主要朝远离攻击者的方向飞行。
detonation-staggered-detonations=0：立即引爆实体中的所有内容。大于 0 的值会在指定 tick 数内均匀分散引爆（+ sqrt(已计划射击数)；60 = 1 秒）。
detonation-initial-detonation-delay=0：立即爆炸。大于 0 的值会在第一次爆炸前增加延迟。
